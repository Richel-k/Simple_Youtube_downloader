spring.application.name=YoutubeAppDownload_Richel_version2

server.port=8080

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true



spring.mvc.async.request-timeout=1


# ===================================================================
# GESTION DES FICHIERS (Optionnel mais recommandé)
# ===================================================================
# Si vous décidez plus tard d'ajouter une fonctionnalité pour envoyer des fichiers 
# via l'application, ces limites évitent les erreurs HTTP 413 (Payload Too Large).
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===================================================================
# LOGS / SÉCURITÉ (Pour le développement)
# ===================================================================
# Niveau de log pour voir ce qui se passe dans Spring Boot
logging.level.org.springframework.web=INFO


# Chemin par défaut pour les téléchargements sur votre Ubuntu
#yt-dlp.default-download-path=/home//Downloads